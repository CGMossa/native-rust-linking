name: windows-linking

# Builds the x86_64-pc-windows-gnu target with vendored OpenSSL, prints the
# linker settings, and commits them to results/ so they are visible in the repo.

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - 'results/**'
      - '**.md'

permissions:
  contents: write

jobs:
  windows-gnu:
    runs-on: windows-latest
    env:
      TARGET: x86_64-pc-windows-gnu
      FEATURES: openssl-sys/vendored
    steps:
      - uses: actions/checkout@v4

      - name: Install gnu toolchain
        shell: pwsh
        run: |
          rustup toolchain install stable-$env:TARGET --no-self-update
          rustup default stable-$env:TARGET
          rustc -vV
          gcc --version

      - name: Print native-static-libs
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force results | Out-Null
          $env:RUSTFLAGS = "--print native-static-libs"
          cargo build --target $env:TARGET --features $env:FEATURES 2>&1 | Tee-Object -FilePath nsl.log
          $line = (Select-String -Path nsl.log -Pattern 'native-static-libs:' | Select-Object -Last 1).Line
          "# target: $env:TARGET (vendored OpenSSL)" | Set-Content results/$env:TARGET-native-static-libs.txt
          $line | Add-Content results/$env:TARGET-native-static-libs.txt
          Write-Host $line

      - name: Print link-args
        shell: pwsh
        run: |
          cargo clean -p linking_to_openssl
          $env:RUSTFLAGS = "--print link-args"
          "# target: $env:TARGET (vendored OpenSSL)" | Set-Content results/$env:TARGET-link-args.txt
          cargo build --target $env:TARGET --features $env:FEATURES 2>&1 | Add-Content results/$env:TARGET-link-args.txt

      - name: Commit results
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results
          git diff --staged --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "CI: windows-gnu linking results [skip ci]"
            git push
          } else {
            Write-Host "no changes"
          }
