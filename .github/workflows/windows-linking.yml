name: windows-linking

# Builds the x86_64-pc-windows-gnu target with vendored OpenSSL, prints the
# linker settings, and commits them to results/ so they are visible in the repo.
#
# Vendored OpenSSL for the mingw target must be configured by a perl that emits
# Unix-style paths, so the build runs inside MSYS2 (which also supplies make +
# the mingw-w64 gcc). Strawberry Perl (the runner default) cannot configure it.

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - 'results/**'
      - '**.md'

permissions:
  contents: write

env:
  TARGET: x86_64-pc-windows-gnu
  FEATURES: openssl-sys/vendored

jobs:
  windows-gnu:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          path-type: inherit          # keep rustup's cargo/rustc on PATH
          install: mingw-w64-x86_64-gcc make perl

      - name: Toolchain
        run: |
          rustup target add "$TARGET"
          rustc -vV
          gcc --version | head -1
          perl --version | sed -n 2p

      - name: Print native-static-libs
        run: |
          mkdir -p results
          RUSTFLAGS="--print native-static-libs" \
            cargo build --target "$TARGET" --features "$FEATURES" 2>&1 | tee nsl.log
          echo "# target: $TARGET (vendored OpenSSL)" > "results/$TARGET-native-static-libs.txt"
          grep 'native-static-libs:' nsl.log | tail -1 >> "results/$TARGET-native-static-libs.txt"

      - name: Print link-args
        run: |
          cargo clean -p linking_to_openssl
          echo "# target: $TARGET (vendored OpenSSL)" > "results/$TARGET-link-args.txt"
          RUSTFLAGS="--print link-args" \
            cargo build --target "$TARGET" --features "$FEATURES" >> "results/$TARGET-link-args.txt" 2>&1

      - name: Commit results
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results
          git diff --staged --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "CI: windows-gnu linking results [skip ci]"
            git push
          } else {
            Write-Host "no changes"
          }
